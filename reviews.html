            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 48px;

            --color-bg: #fafafa;
            --color-surface: #ffffff;

            --color-accent: #1a1a1a;

            --shadow-md: 0 4px 14px rgba(0,0,0,0.06);

        * {

            padding: 0;
            box-sizing: border-box;
        }

        html {

            -webkit-font-smoothing: antialiased;

        }

        body {
            font-family: var(--font-sans);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            letter-spacing: -0.01em;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: var(--grid-max);
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        hr {

            border-top: 1px solid var(--color-border);
            margin: var(--spacing-lg) 0;
        }

        /* ---- HEADER & NAV ---- */
        header {

            top: 0;

            backdrop-filter: blur(14px);
            background: rgba(255, 255, 255, 0.88);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-sm) 0;
            flex-wrap: wrap;
            gap: var(--spacing-xs);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
            text-decoration: none;
            color: var(--color-text);
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;

        .logo-emoji {
            font-size: 1.5rem;
            line-height: 1;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: var(--spacing-md);
            flex-wrap: wrap;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--color-text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color var(--transition), border-bottom var(--transition);
            padding-bottom: 2px;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        nav a:hover,
        nav a:focus-visible {
            color: var(--color-accent-hover);
            border-bottom-color: var(--color-accent);
            outline: none;
        }

        .tel-link-header {
            background: var(--color-accent);
            color: #fff;
            padding: 8px 18px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background var(--transition), transform var(--transition);
            white-space: nowrap;
            letter-spacing: -0.01em;
        }

        .tel-link-header:hover {
            background: var(--color-accent-hover);
            transform: translateY(-1px);
        }

        .nav-present {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .hamburger-menu {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-direction: column;
            gap: 5px;
            z-index: 101;
        }

        .hamburger-menu span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-text);
            border-radius: 2px;
            transition: var(--transition);
        }

        @media (max-width: 768px) {
            .responsive-768 nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: var(--spacing-md);
                gap: var(--spacing-sm);
                box-shadow: var(--shadow-md);
            }

            .responsive-768 nav ul.active {
                display: flex;
            }

            .hamburger-menu {
                display: flex;
            }

            .tel-link-header.responsive-768-inline {
                display: inline-flex;
            }

            nav .tel-link-header {
                display: none;
            }

            .nav-present .tel-link-header {
                display: inline-flex;
                font-size: 0.82rem;
                padding: 6px 14px;
            }
        }

        /* ---- MAIN CONTENT ---- */
        main {
            flex: 1;
            padding: var(--spacing-lg) 0 var(--spacing-xl);
        }

            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: var(--spacing-xs);
            line-height: 1.2;
        }

            font-size: 1.15rem;
            color: var(--color-text-secondary);
            margin-bottom: var(--spacing-lg);
            font-weight: 400;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;

        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);

            padding: var(--spacing-md);
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition), transform var(--transition);

            transform: translateY(-2px);

        .badge {

            font-size: 0.78rem;
            font-weight: 500;
            color: var(--color-text-secondary);

        .faq-section {

            font-weight: 700;
            margin-bottom: var(--spacing-md);

        }

        .faq-item {

            padding: var(--spacing-sm) 0;
            cursor: pointer;
        }

        .faq-question {
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: color var(--transition);
            user-select: none;
        }

        .faq-question:hover {
            color: var(--color-accent-hover);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease;
            color: var(--color-text-secondary);
            font-size: 0.95rem;
            line-height: 1.65;
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
            padding-top: var(--spacing-xs);
        }

        .trust-signal {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
            margin: var(--spacing-xl) 0;
            box-shadow: var(--shadow-sm);
        }

        .trust-signal h3 {
            font-size: 1.4rem;
            margin-bottom: var(--spacing-xs);
        }

        .trust-signal p {
            color: var(--color-text-secondary);
            max-width: 600px;
            margin: 0 auto var(--spacing-md);
        }

        .highlight-number {
            font-size: 2.4rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            display: block;
            margin-bottom: 4px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: var(--spacing-xl);
            flex-wrap: wrap;
            margin: var(--spacing-md) 0;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 120px;
        }

        footer {
            border-top: 1px solid var(--color-border);
            padding: var(--spacing-md) 0;
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            background: var(--color-surface);
        }
    </style>
</head>
